name: Build Meme App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------
      # Setup Node (use modern version)
      # -------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      # -------------------------
      # Setup pnpm
      # -------------------------
      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile=false

      # -------------------------
      # Build app
      # -------------------------
      - name: Build app
        run: pnpm exec electron-builder --publish=never

      # -------------------------
      # Locate build outputs
      # -------------------------
      - name: Find build files (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Include *.exe | Select-Object -Expand FullName > files.txt

      - name: Find build files (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          find . -type f \( -name "*.AppImage" -o -name "*.exe" \) > files.txt

      # -------------------------
      # Generate checksums
      # -------------------------
      - name: SHA checksums (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $files = Get-Content files.txt
          foreach ($f in $files) {
            Get-FileHash $f -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  $f" } >> SHA256SUMS.txt
            Get-FileHash $f -Algorithm SHA512 | ForEach-Object { "$($_.Hash)  $f" } >> SHA512SUMS.txt
          }

      - name: SHA checksums (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sha256sum $(cat files.txt) > SHA256SUMS.txt
          sha512sum $(cat files.txt) > SHA512SUMS.txt

      # -------------------------
      # Upload artifacts
      # -------------------------
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            **/*.exe
            **/*.AppImage
            SHA256SUMS.txt
            SHA512SUMS.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten files
        run: find dist -type f -exec mv {} dist/ \; || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}